name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: ["master"]
    paths-ignore:
      - 'backend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --base-href "/QuantMessage_App/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
      - uses: actions/deploy-pages@v4
