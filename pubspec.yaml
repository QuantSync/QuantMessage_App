name: q_ai_mob_testt
description: QuantMessage.Ai — Multi-Agent AI Messaging Hub
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ──────────────────────────────────────────────────────────────
  # 🔐 SECURITY & CONFIG (Essential for API Keys)
  # ──────────────────────────────────────────────────────────────
  flutter_dotenv: ^5.2.1 # Used to store Flowise URL and API Key securely

  # ──────────────────────────────────────────────────────────────
  # 🌐 NETWORKING & AI INTEGRATION
  # ──────────────────────────────────────────────────────────────
  dio: ^5.4.3+1             # Primary for Flowise API calls
  http: ^1.2.0
  web_socket_channel: ^3.0.1 # For streaming AI responses (word-by-word)

  # ──────────────────────────────────────────────────────────────
  # ☁️ SUPABASE & AUTH
  # ──────────────────────────────────────────────────────────────
  supabase_flutter: ^2.10.0

  # ──────────────────────────────────────────────────────────────
  # 🧠 STATE MANAGEMENT & PERSISTENCE
  # ──────────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1   # Managing AI loading states and chat history
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ──────────────────────────────────────────────────────────────
  # 📱 RESPONSIVE UI & ANIMATIONS
  # ──────────────────────────────────────────────────────────────
  flutter_screenutil: ^5.9.3 # ADDED: Makes UI adapt to any screen size (Mobile/Web/Tablet)
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4    # Essential for rendering AI code blocks and bold text
  fl_chart: ^1.0.0           # For Quant financial charts
  shimmer: ^3.0.0            # For "Loading" skeletons
  animate_do: ^3.3.4
  lottie: ^3.1.2
  cached_network_image: ^3.4.1

  # ──────────────────────────────────────────────────────────────
  # 📄 MULTIMODAL (PDF / Image / Files)
  # ──────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  image_picker_for_web: ^3.0.0
  file_picker: ^8.1.4
  syncfusion_flutter_pdfviewer: ^27.1.48
  mime: ^1.0.6

  # ──────────────────────────────────────────────────────────────
  # 🎙️ HARDWARE & VOICE
  # ──────────────────────────────────────────────────────────────
  mobile_scanner: ^4.0.1
  permission_handler: ^11.3.1
  record: ^5.1.2
  just_audio: ^0.9.40
  speech_to_text: ^7.3.0

  # ──────────────────────────────────────────────────────────────
  # 🛠️ UTILITIES
  # ──────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  jwt_decoder: ^2.0.1
  path_provider: ^2.1.3
  path: ^1.9.0
  file_selector: ^1.0.3

  # ──────────────────────────────────────────────────────────────
  # 🔑 AUTH DEPENDENCIES
  # ──────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.0

  # ──────────────────────────────────────────────────────────────
  # 🌐 FIREBASE WEB DELEGATES
  # ──────────────────────────────────────────────────────────────
  firebase_core_web: ^2.15.0
  firebase_auth_web: ^5.8.0
  google_sign_in_web: ^0.12.4
  flutter_facebook_auth_web: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env  # This is where you will put your Flowise URL and API Key
