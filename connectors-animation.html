<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connectors Animation — Multi-Agent Workflow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(circle at 30% 20%, #141420, #08080C);
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: "Segoe UI", Arial, sans-serif;
  }
  .wrapper { width: min(92vw, 820px); }
  .stage { width: 100%; height: auto; aspect-ratio: 820 / 440; border-radius: 18px; }

  .dot { offset-rotate: auto; animation: travel 3s linear infinite; }
  .d2 { animation-delay: -0.45s; }
  .d3 { animation-delay: -1.05s; }
  .d4 { animation-delay: -1.65s; }
  @keyframes travel { from { offset-distance: 0%; } to { offset-distance: 100%; } }

  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
  @keyframes spin  { to { transform: rotate(360deg); } }
  .pulse { transform-origin: center; animation: pulse 2s ease-in-out infinite; }
  .spin  { transform-origin: 792px 300px; animation: spin 1.5s linear infinite; }

  .caption { color: #888; text-align: center; margin-top: 16px; font-size: 14px; }
</style>
</head>
<body>
  <div class="wrapper">
    <svg class="stage" viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bg" cx="30%" cy="20%" r="120%">
          <stop offset="0%" stop-color="#141420"/><stop offset="100%" stop-color="#08080C"/>
        </radialGradient>
        <linearGradient id="gStart" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1C6B3D"/><stop offset="100%" stop-color="#0E3A20"/></linearGradient>
        <linearGradient id="gDetect" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4A1628"/><stop offset="100%" stop-color="#28091A"/></linearGradient>
        <linearGradient id="gAgent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#12393B"/><stop offset="100%" stop-color="#06201F"/></linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="8" cy="8" r="1.1" fill="#fff" opacity="0.05"/><circle cx="8" cy="8" r="1.6" fill="#60A5FA" opacity="0.10"/></pattern>
      </defs>

      <rect width="820" height="440" rx="18" fill="url(#bg)"/>
      <rect width="820" height="440" rx="18" fill="url(#dots)"/>

      <g fill="none" stroke="#E85D9E" stroke-linecap="round">
        <path d="M178,229 C198,229 185,230 205,230" stroke-opacity="0.22" stroke-width="7" filter="url(#glow)"/>
        <path d="M178,229 C198,229 185,230 205,230" stroke-opacity="0.55" stroke-width="2"/>
        <path d="M475,185 C495,185 500,92 520,92" stroke-opacity="0.22" stroke-width="7" filter="url(#glow)"/>
        <path d="M475,185 C495,185 500,92 520,92" stroke-opacity="0.55" stroke-width="2"/>
        <path d="M475,230 C495,230 500,228 520,228" stroke-opacity="0.22" stroke-width="7" filter="url(#glow)"/>
        <path d="M475,230 C495,230 500,228 520,228" stroke-opacity="0.55" stroke-width="2"/>
        <path d="M475,275 C495,275 500,355 520,355" stroke-opacity="0.22" stroke-width="7" filter="url(#glow)"/>
        <path d="M475,275 C495,275 500,355 520,355" stroke-opacity="0.55" stroke-width="2"/>
      </g>

      <g fill="#E85D9E">
        <rect x="175.5" y="222" width="5" height="14" rx="2"/><rect x="202.5" y="223" width="5" height="14" rx="2"/>
        <rect x="472.5" y="178" width="5" height="14" rx="2"/><rect x="517.5" y="85" width="5" height="14" rx="2"/>
        <rect x="472.5" y="223" width="5" height="14" rx="2"/><rect x="517.5" y="221" width="5" height="14" rx="2"/>
        <rect x="472.5" y="268" width="5" height="14" rx="2"/><rect x="517.5" y="348" width="5" height="14" rx="2"/>
      </g>

      <g filter="url(#glow)">
        <rect x="28" y="195" width="150" height="68" rx="16" fill="url(#gStart)"/>
        <text x="108" y="234" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">Start</text>
        <g class="pulse"><circle cx="170" cy="187" r="11" fill="#22C55E"/></g>

        <rect x="205" y="165" width="270" height="130" rx="18" fill="url(#gDetect)"/>
        <text x="340" y="210" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">Detect User Intention</text>
        <text x="340" y="240" fill="#34D399" font-size="11" text-anchor="middle">gpt-4.1</text>
        <g class="pulse"><circle cx="467" cy="157" r="11" fill="#22C55E"/></g>

        <rect x="520" y="45" width="280" height="95" rx="16" fill="url(#gAgent)"/>
        <text x="660" y="85" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Technical Agent</text>
        <text x="660" y="110" fill="#60A5FA" font-size="11" text-anchor="middle">gemini-2.0-flash</text>
        <circle cx="792" cy="37" r="11" fill="#22C55E"/>

        <rect x="520" y="163" width="280" height="130" rx="16" fill="url(#gAgent)"/>
        <text x="660" y="205" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Agent 1</text>
        <text x="660" y="230" fill="#F59E0B" font-size="11" text-anchor="middle">claude-3-7-sonnet-latest</text>

        <rect x="520" y="308" width="280" height="95" rx="16" fill="url(#gAgent)" stroke="#22D3EE" stroke-width="1.6"/>
        <text x="660" y="348" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Agent 2</text>
        <text x="660" y="373" fill="#A78BFA" font-size="11" text-anchor="middle">gpt-4o-mini</text>
        <g class="spin"><circle cx="792" cy="300" r="11" fill="#F59E0B"/><path d="M792,295 v10 M787,300 h10" stroke="#fff" stroke-width="2"/></g>
      </g>

      <circle class="dot"   r="4" fill="#E85D9E" style="offset-path: path('M178,229 C198,229 185,230 205,230');"/>
      <circle class="dot d2" r="4" fill="#A855F7" style="offset-path: path('M475,185 C495,185 500,92 520,92');"/>
      <circle class="dot d3" r="4" fill="#E85D9E" style="offset-path: path('M475,230 C495,230 500,228 520,228');"/>
      <circle class="dot d4" r="4" fill="#A855F7" style="offset-path: path('M475,275 C495,275 500,355 520,355');"/>
    </svg>
    <p class="caption">Start → Detect User Intention → (Technical Agent · Agent 1 · Agent 2)</p>
  </div>
</body>
</html>
